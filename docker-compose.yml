version: '3.8'

services:
  waha:
    image: devlikeapro/waha
    container_name: waha
    restart: always
    ports:
      - "3000:3000"
    environment:
      - WHATSAPP_DEFAULT_ENGINE=NOWEB
      - WAHA_DASHBOARD_NO_PASSWORD=true
      - WAHA_API_KEY=123
      - WAHA_WEBHOOK_URL=http://fastapi-backend.com:8000/webhook
      - WAHA_WEBHOOK_EVENTS=message,message.any
      - WHATSAPP_HOOK_URL=http://fastapi-backend.com:8000/webhook
      - WHATSAPP_HOOK_EVENTS=message,message.any
      - WAHA_SESSIONS=default,backup
    volumes:
      - ./waha_data:/app/.waha

  fastapi_app:
    build:
      context: ./app
      dockerfile: Dockerfile
    container_name: fastapi_backend
    restart: always
    ports:
      - "8000:8000"
    volumes:
      - ./app:/app
      - ./messages.json:/app/messages.json
    networks:
      default:
        aliases:
          - fastapi-backend.com
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - DB_HOST=${DB_HOST}
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASS=${DB_PASS}
      - WAHA_URL=http://waha:3000
      - WAHA_SESSION=${WAHA_SESSION}
      - AI_PROVIDER=${AI_PROVIDER}
      - OLLAMA_URL=${OLLAMA_URL}
      - OLLAMA_MODEL=${OLLAMA_MODEL}
      - OLLAMA_VISION_MODEL=${OLLAMA_VISION_MODEL}
    depends_on:
      - waha

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: phpmyadmin
    restart: always
    ports:
      - "8081:80"
    environment:
      - PMA_HOST=${DB_HOST}
      - PMA_USER=${DB_USER}
      - PMA_PASSWORD=${DB_PASS}
      - PMA_AUTH_TYPE=config
