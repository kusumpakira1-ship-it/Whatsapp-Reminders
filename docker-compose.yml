services:

  # ─────────────────────────────────────────────
  # WAHA — WhatsApp HTTP API
  # ─────────────────────────────────────────────
  waha:
    image: devlikeapro/waha
    container_name: waha
    restart: always
    ports:
      - "3000:3000"
    environment:
      - WHATSAPP_DEFAULT_ENGINE=NOWEB
      - WAHA_DASHBOARD_NO_PASSWORD=true
      - WAHA_API_KEY=123
      - WAHA_WEBHOOK_URL=http://fastapi-backend.com:8000/webhook
      - WAHA_WEBHOOK_EVENTS=message,message.any
      - WHATSAPP_HOOK_URL=http://fastapi-backend.com:8000/webhook
      - WHATSAPP_HOOK_EVENTS=message,message.any
      - WAHA_SESSIONS=default
    volumes:
      - ./waha_data:/app/.waha

  # ─────────────────────────────────────────────
  # BACKEND — FastAPI Python Application
  # ─────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fastapi_backend
    restart: always
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./messages.json:/app/messages.json
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      default:
        aliases:
          - fastapi-backend.com
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - DB_HOST=${DB_HOST}
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASS=${DB_PASS}
      - MANAGER_PHONE=${MANAGER_PHONE}
      - WAHA_URL=http://waha:3000
      - WAHA_SESSION=${WAHA_SESSION}
      - WAHA_API_KEY=${WAHA_API_KEY}
      - AI_PROVIDER=${AI_PROVIDER}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - OLLAMA_URL=${OLLAMA_URL}
      - OLLAMA_MODEL=${OLLAMA_MODEL}
      - OLLAMA_VISION_MODEL=${OLLAMA_VISION_MODEL}
      - USE_N8N=${USE_N8N}
    depends_on:
      - waha

  # ─────────────────────────────────────────────
  # FRONTEND — nginx serving HTML/CSS/JS
  # ─────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend

  # ─────────────────────────────────────────────
  # PHPMYADMIN — Database Management UI
  # ─────────────────────────────────────────────
  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: phpmyadmin
    restart: always
    ports:
      - "8081:80"
    environment:
      - PMA_HOST=${DB_HOST}
      - PMA_USER=${DB_USER}
      - PMA_PASSWORD=${DB_PASS}
      - PMA_AUTH_TYPE=config

  # ─────────────────────────────────────────────
  # N8N — Workflow Automation
  # ─────────────────────────────────────────────
  n8n:
    build:
      context: ./n8n
      dockerfile: Dockerfile
    container_name: n8n
    restart: always
    ports:
      - "5678:5678"
    environment:
      - N8N_SECURE_COOKIE=false
    volumes:
      - ./n8n_data:/home/node/.n8n
